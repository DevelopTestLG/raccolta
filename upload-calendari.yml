name: Upload Calendari su Cloudflare KV

on:
  push:
    paths:
      - 'calendari/**'   # si attiva solo quando cambia qualcosa in /calendari
  workflow_dispatch:      # permette di lanciarlo a mano dalla UI di GitHub

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa dipendenze
        run: npm ci
        working-directory: scripts

      - name: Converti e carica su KV
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_NAMESPACE_ID: ${{ secrets.CF_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node scripts/upload.js
